<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prick IA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #676767;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            background: rgb(49, 49, 49);
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            color: #fff;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            max-width: 60%;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 10px;
            line-height: 1.4;
        }

        .user {
            background: #2a2a2a;
            align-self: flex-end;
            color: #fff;
        }

        .bot {
            background: rgb(80, 80, 80);
            border: 1px solid #ddd;
            align-self: flex-start;
            color: #ffffff;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: rgb(67, 67, 67);
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: #10a37f;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0e8c6d;
        }
    </style>
</head>

<body>
<div class="header">🤖 Prick IA</div>

<div class="chat" id="chat"></div>

<div class="input-area">
    <input type="text" id="msg" placeholder="Digite sua mensagem...">
    <button onclick="enviar()">Enviar</button>
</div>

<script>
async function enviar() {
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");
    const mensagem = input.value.trim();
    if (!mensagem) return;

    // Mensagem do usuário
    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = mensagem;
    chat.appendChild(userMsg);

    input.value = "";

    // Mensagem da IA (placeholder)
    const botMsg = document.createElement("div");
    botMsg.className = "msg bot";
    botMsg.innerText = "Pensando...";
    chat.appendChild(botMsg);

    chat.scrollTop = chat.scrollHeight;

    try {
        // Troque 'SEU_SERVER_URL' pela URL pública do Flask (ou IP da sua máquina)
        const res = await fetch("http://192.168.1.1/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mensagem })
        });

        const data = await res.json();
        botMsg.innerText = data.resposta;

    } catch (erro) {
        botMsg.innerText = "Erro ao conectar!";
        console.error(erro);
    }

    chat.scrollTop = chat.scrollHeight;
}

// Enviar com ENTER
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") enviar();
});
</script>

</body>
</html>
