<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prick IA</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #676767;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            background: rgb(49, 49, 49);
            color: #fff;
            font-weight: bold;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            max-width: 60%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .user {
            background: #2a2a2a;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #505050;
            color: white;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: #444;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #10a37f;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0e8c6d;
        }
    </style>
</head>

<body>

<div class="header">🤖 Prick IA</div>

<div class="chat" id="chat"></div>

<div class="input-area">
    <input type="text" id="msg" placeholder="Digite sua mensagem...">
    <button onclick="enviar()">Enviar</button>
</div>

<script>
async function enviar() {
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");

    const mensagem = input.value.trim();
    if (!mensagem) return;

    // mensagem do usuário
    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = mensagem;
    chat.appendChild(userMsg);

    input.value = "";

    // mensagem da IA (loading)
    const botMsg = document.createElement("div");
    botMsg.className = "msg bot";
    botMsg.innerText = "Pensando...";
    chat.appendChild(botMsg);

    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("https://server-py-13b6.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ mensagem: mensagem })
        });

        if (!res.ok) {
            botMsg.innerText = "Erro no servidor!";
            return;
        }

        const data = await res.json();

        botMsg.innerText = data.resposta || "Sem resposta da IA.";

    } catch (erro) {
        botMsg.innerText = "Erro ao conectar!";
        console.error(erro);
    }

    chat.scrollTop = chat.scrollHeight;
}

// enviar com ENTER
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") enviar();
});
</script>

</body>
</html>
